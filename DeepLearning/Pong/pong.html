<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            background-color: #222;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            background-color: black;
            border: 2px solid white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <canvas id="pongCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");

        // Game Constants
        const PADDLE_WIDTH = 10;
        const PADDLE_HEIGHT = 100;
        const BALL_RADIUS = 8;
        const PADDLE_SPEED = 6;
        const INITIAL_BALL_SPEED = 5;

        // Player (Left Paddle)
        const player = {
            x: 0,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            color: "white",
            score: 0,
            dy: 0
        };

        // AI (Right Paddle)
        const ai = {
            x: canvas.width - PADDLE_WIDTH,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            color: "white",
            score: 0,
            speed: 4
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: BALL_RADIUS,
            speed: INITIAL_BALL_SPEED,
            dx: INITIAL_BALL_SPEED,
            dy: INITIAL_BALL_SPEED,
            color: "white"
        };

        // Key states
        const keys = {
            ArrowUp: false,
            ArrowDown: false
        };

        // Event Listeners for arrow keys
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp" || e.key === "ArrowDown") {
                keys[e.key] = true;
                e.preventDefault(); // Prevent scrolling
            }
        });

        document.addEventListener("keyup", (e) => {
            if (e.key === "ArrowUp" || e.key === "ArrowDown") {
                keys[e.key] = false;
            }
        });

        // Draw Rectangles (Paddles)
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        // Draw Circle (Ball)
        function drawArc(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
        }

        // Draw Text (Score)
        function drawText(text, x, y, color) {
            ctx.fillStyle = color;
            ctx.font = "45px 'Courier New', Courier, monospace";
            ctx.fillText(text, x, y);
        }

        // Draw Net
        function drawNet() {
            for (let i = 0; i <= canvas.height; i += 20) {
                drawRect(canvas.width / 2 - 1, i, 2, 10, "white");
            }
        }

        // Reset Ball after a score
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = INITIAL_BALL_SPEED;
            ball.dx = -ball.dx; // Serve to the player who just scored
            // Randomize starting Y direction
            ball.dy = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 3 + 2);
        }

        // Collision Detection (AABB - Axis-Aligned Bounding Box)
        function collision(b, p) {
            b.top = b.y - b.radius;
            b.bottom = b.y + b.radius;
            b.left = b.x - b.radius;
            b.right = b.x + b.radius;

            p.top = p.y;
            p.bottom = p.y + p.height;
            p.left = p.x;
            p.right = p.x + p.width;

            return b.right > p.left && b.bottom > p.top && b.left < p.right && b.top < p.bottom;
        }

        // Update Game Logic
        function update() {
            // Move Player
            if (keys.ArrowUp && player.y > 0) {
                player.y -= PADDLE_SPEED;
            } else if (keys.ArrowDown && player.y + player.height < canvas.height) {
                player.y += PADDLE_SPEED;
            }

            // Move AI (Simple tracking logic)
            // Determine center of AI paddle
            let aiCenter = ai.y + ai.height / 2;
            // Move towards the ball if the ball is moving towards the AI
            if (ball.dx > 0) {
                if (aiCenter < ball.y - 10) {
                    ai.y += ai.speed;
                } else if (aiCenter > ball.y + 10) {
                    ai.y -= ai.speed;
                }
            }

            // Constrain AI to canvas bounds
            if (ai.y < 0) ai.y = 0;
            if (ai.y + ai.height > canvas.height) ai.y = canvas.height - ai.height;

            // Move Ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
            }

            // Check which paddle the ball is hitting
            let paddle = (ball.x < canvas.width / 2) ? player : ai;

            if (collision(ball, paddle)) {
                // Determine where the ball hit the paddle
                let collidePoint = ball.y - (paddle.y + paddle.height / 2);

                // Normalize the value between -1 and 1
                collidePoint = collidePoint / (paddle.height / 2);

                // Calculate the angle in Radian (max 45 degrees or PI/4)
                let angleRad = collidePoint * (Math.PI / 4);

                // Direction of the ball (X) depends on the paddle
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;

                // Update velocity X and Y
                ball.dx = direction * ball.speed * Math.cos(angleRad);
                ball.dy = ball.speed * Math.sin(angleRad);

                // Increase speed slightly after every hit
                ball.speed += 0.5;
            }

            // Score updating
            if (ball.x - ball.radius < 0) {
                // AI scores
                ai.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                // Player scores
                player.score++;
                resetBall();
            }
        }

        // Render Game Graphics
        function draw() {
            // Clear canvas
            drawRect(0, 0, canvas.width, canvas.height, "black");

            // Draw Score
            drawText(player.score, canvas.width / 4, 50, "white");
            drawText(ai.score, 3 * canvas.width / 4, 50, "white");

            // Draw Net
            drawNet();

            // Draw Paddles
            drawRect(player.x, player.y, player.width, player.height, player.color);
            drawRect(ai.x, ai.y, ai.width, ai.height, ai.color);

            // Draw Ball
            drawArc(ball.x, ball.y, ball.radius, ball.color);
        }

        // Game Loop
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Start Game
        loop();
    </script>
</body>

</html>
