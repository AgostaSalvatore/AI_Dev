<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #111;
            color: #0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Press Start 2P', cursive;
            background-image: radial-gradient(circle, #222 10%, #000 80%);
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        canvas {
            background-color: #000;
            border: 4px solid #0ff;
            box-shadow: 0 0 15px #0ff, inset 0 0 15px #0ff;
            border-radius: 10px;
        }

        .top-controls {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            text-shadow: 0 0 5px #0ff;
            margin-bottom: 5px;
        }

        .controls-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            align-items: center;
            text-shadow: 0 0 5px #0ff;
        }

        .score-board {
            font-size: 20px;
            color: #f0f;
            text-shadow: 0 0 5px #f0f;
        }

        .difficulty-selector {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select {
            font-size: 12px;
            padding: 8px;
            background-color: #000;
            color: #0ff;
            border: 2px solid #0ff;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            box-shadow: 0 0 10px #0ff;
            outline: none;
        }

        select:hover {
            background-color: #112;
        }

        select option {
            background-color: #000;
        }
    </style>
</head>

<body>
    <div class="game-container">
        <div class="top-controls">
            <div class="difficulty-selector">
                <label for="maxScore">Punti per vincere:</label>
                <select id="maxScore">
                    <option value="3">3</option>
                    <option value="5" selected>5</option>
                    <option value="10">10</option>
                </select>

                <label for="difficulty" style="margin-left: 15px;">Difficoltà:</label>
                <select id="difficulty">
                    <option value="easy">Facile</option>
                    <option value="medium" selected>Media</option>
                    <option value="hard">Difficile</option>
                </select>
            </div>
        </div>

        <canvas id="pongCanvas" width="800" height="400"></canvas>

        <div class="controls-container">
            <div class="score-board">
                Giocatore: <span id="playerScoreEl">0</span> - <span id="aiScoreEl">0</span> :AI
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");
        const playerScoreEl = document.getElementById("playerScoreEl");
        const aiScoreEl = document.getElementById("aiScoreEl");
        const difficultySelect = document.getElementById("difficulty");
        const maxScoreSelect = document.getElementById("maxScore");

        // Game Constants
        const PADDLE_WIDTH = 12;
        const PADDLE_HEIGHT = 100;
        const BALL_RADIUS = 8;
        const PADDLE_SPEED = 6;
        const INITIAL_BALL_SPEED = 6;

        // Game State
        let gameState = "playing"; // "playing", "countdown", or "gameover"
        let countdownTimer = 0;
        let lastTime = 0;
        let maxScore = parseInt(maxScoreSelect.value);
        let winner = "";

        // Colors
        const COLOR_NEON_BLUE = "#0ff";
        const COLOR_NEON_PINK = "#f0f";

        // Player (Left Paddle)
        const player = {
            x: 10,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            color: COLOR_NEON_PINK,
            score: 0,
            dy: 0
        };

        // AI (Right Paddle)
        const ai = {
            x: canvas.width - PADDLE_WIDTH - 10,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            color: COLOR_NEON_BLUE,
            score: 0,
            speed: 4
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: BALL_RADIUS,
            speed: INITIAL_BALL_SPEED,
            dx: INITIAL_BALL_SPEED,
            dy: INITIAL_BALL_SPEED,
            color: "#fff"
        };

        // Key states
        const keys = {
            ArrowUp: false,
            ArrowDown: false
        };

        // Event Listeners for arrow keys
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp" || e.key === "ArrowDown") {
                keys[e.key] = true;
                e.preventDefault(); // Prevent scrolling
            }
        });

        document.addEventListener("keyup", (e) => {
            if (e.key === "ArrowUp" || e.key === "ArrowDown") {
                keys[e.key] = false;
            }
        });

        // Draw Rectangles (Paddles)
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 10;
            ctx.fillRect(x, y, w, h);
            ctx.shadowBlur = 0; // Reset
        }

        // Draw Circle (Ball)
        function drawArc(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0; // Reset
        }

        // Draw Text (Countdown)
        function drawTextCenter(text, color, size) {
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 20;
            ctx.font = `${size}px 'Press Start 2P', cursive`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // Handle multi-line text (for game over screen)
            const lines = text.split('\n');
            const lineHeight = size * 1.5;
            const startY = canvas.height / 2 - (lines.length - 1) * lineHeight / 2;

            lines.forEach((line, index) => {
                ctx.fillText(line, canvas.width / 2, startY + index * lineHeight);
            });

            ctx.shadowBlur = 0; // Reset
            ctx.textAlign = "start"; // Reset default
            ctx.textBaseline = "alphabetic";
        }

        // Restart Full Game
        function restartGame() {
            player.score = 0;
            ai.score = 0;
            playerScoreEl.textContent = "0";
            aiScoreEl.textContent = "0";
            maxScore = parseInt(maxScoreSelect.value);
            winner = "";
            startCountdown();
        }

        // Handle Max Score Changes
        maxScoreSelect.addEventListener("change", (e) => {
            restartGame();
        });

        // Handle Difficulty Changes
        difficultySelect.addEventListener("change", (e) => {
            switch (e.target.value) {
                case "easy":
                    ai.speed = 2.5;
                    break;
                case "medium":
                    ai.speed = 4;
                    break;
                case "hard":
                    ai.speed = 7;
                    break;
            }
            restartGame();
        });

        // Draw Net
        function drawNet() {
            ctx.setLineDash([15, 15]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.strokeStyle = "rgba(0, 255, 255, 0.3)";
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.setLineDash([]); // Reset
        }

        // Start Countdown
        function startCountdown() {
            gameState = "countdown";
            countdownTimer = 3;
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;

            let interval = setInterval(() => {
                countdownTimer--;
                if (countdownTimer <= 0) {
                    clearInterval(interval);
                    resetBall();
                    gameState = "playing";
                }
            }, 1000);
        }

        // Reset Ball after a score
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = INITIAL_BALL_SPEED;
            // ball.dx = -ball.dx; // Serve to the player who just scored

            // Randomize starting directions properly
            let directionX = ball.dx > 0 ? -1 : 1;
            ball.dx = directionX * INITIAL_BALL_SPEED;
            ball.dy = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 3 + 2);
        }

        // Collision Detection (AABB - Axis-Aligned Bounding Box)
        function collision(b, p) {
            b.top = b.y - b.radius;
            b.bottom = b.y + b.radius;
            b.left = b.x - b.radius;
            b.right = b.x + b.radius;

            p.top = p.y;
            p.bottom = p.y + p.height;
            p.left = p.x;
            p.right = p.x + p.width;

            return b.right > p.left && b.bottom > p.top && b.left < p.right && b.top < p.bottom;
        }

        // Update Game Logic
        function update() {
            // Move Player
            if (keys.ArrowUp && player.y > 0) {
                player.y -= PADDLE_SPEED;
            } else if (keys.ArrowDown && player.y + player.height < canvas.height) {
                player.y += PADDLE_SPEED;
            }

            // Move AI (Simple tracking logic)
            // Determine center of AI paddle
            let aiCenter = ai.y + ai.height / 2;
            // Move towards the ball if the ball is moving towards the AI
            if (ball.dx > 0) {
                if (aiCenter < ball.y - 10) {
                    ai.y += ai.speed;
                } else if (aiCenter > ball.y + 10) {
                    ai.y -= ai.speed;
                }
            }

            // Constrain AI to canvas bounds
            if (ai.y < 0) ai.y = 0;
            if (ai.y + ai.height > canvas.height) ai.y = canvas.height - ai.height;

            // Move Ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
            }

            // Check which paddle the ball is hitting
            let paddle = (ball.x < canvas.width / 2) ? player : ai;

            if (collision(ball, paddle)) {
                // Determine where the ball hit the paddle
                let collidePoint = ball.y - (paddle.y + paddle.height / 2);

                // Normalize the value between -1 and 1
                collidePoint = collidePoint / (paddle.height / 2);

                // Calculate the angle in Radian (max 45 degrees or PI/4)
                let angleRad = collidePoint * (Math.PI / 4);

                // Direction of the ball (X) depends on the paddle
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;

                // Update velocity X and Y
                ball.dx = direction * ball.speed * Math.cos(angleRad);
                ball.dy = ball.speed * Math.sin(angleRad);

                // Increase speed slightly after every hit
                ball.speed += 0.5;
            }

            // Score updating
            if (ball.x - ball.radius < 0) {
                // AI scores
                ai.score++;
                aiScoreEl.textContent = ai.score;
                checkWin();
            } else if (ball.x + ball.radius > canvas.width) {
                // Player scores
                player.score++;
                playerScoreEl.textContent = player.score;
                checkWin();
            }
        }

        // Check if someone won
        function checkWin() {
            if (player.score >= maxScore) {
                gameState = "gameover";
                winner = "Giocatore";
            } else if (ai.score >= maxScore) {
                gameState = "gameover";
                winner = "AI";
            } else {
                startCountdown();
            }
        }

        // Render Game Graphics
        function draw() {
            // Clear canvas
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Net
            drawNet();

            // Draw Paddles
            drawRect(player.x, player.y, player.width, player.height, player.color);
            drawRect(ai.x, ai.y, ai.width, ai.height, ai.color);

            // Draw Ball if playing
            if (gameState === "playing") {
                drawArc(ball.x, ball.y, ball.radius, ball.color);
            } else if (gameState === "countdown") {
                // Draw countdown text
                if (countdownTimer > 0) {
                    drawTextCenter(countdownTimer.toString(), COLOR_NEON_PINK, 60);
                }
            } else if (gameState === "gameover") {
                // Draw game over text
                const color = winner === "Giocatore" ? COLOR_NEON_PINK : COLOR_NEON_BLUE;
                drawTextCenter(`Vince: ${winner}!\n\nPremi Spazio per riprovare`, color, 30);
            }
        }

        // Restart with Spacebar if game over
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space" && gameState === "gameover") {
                e.preventDefault();
                restartGame();
            }
        });

        // Game Loop
        function loop(timestamp) {
            // Cap framerate / handle time passing if needed, standard rAF is fine here
            if (gameState === "playing") {
                update();
            }
            // Always allow player paddle movement even in countdown
            else if (gameState === "countdown") {
                if (keys.ArrowUp && player.y > 0) {
                    player.y -= PADDLE_SPEED;
                } else if (keys.ArrowDown && player.y + player.height < canvas.height) {
                    player.y += PADDLE_SPEED;
                }

                // Allow AI to slowly return to center during countdown
                let aiCenter = ai.y + ai.height / 2;
                if (aiCenter < canvas.height / 2 - 5) ai.y += 2;
                else if (aiCenter > canvas.height / 2 + 5) ai.y -= 2;
            }

            draw();
            requestAnimationFrame(loop);
        }

        // Start Game with initial countdown
        startCountdown();
        requestAnimationFrame(loop);
    </script>
</body>

</html>
